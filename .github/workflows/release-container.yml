name: Release Container

on:
  release:
    types: [published] # Other types: created, edited, deleted, prereleased, released, etc.

  pull_request:
    branches:
      - main

permissions: read-all

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-push-image:
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      packages: write
      attestations: write
      id-token: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
      - name: Run release script
        if: ${{ github.event_name != 'pull_request' }}
        run: |
          echo "Release version: ${{ github.event.release.tag_name }}"
          echo "Release published by: ${{ github.event.release.author.login }}"
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4
      - name: Log in to the Container registry
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GHTOKEN }}
      - name: Extract metadata (tags, labels) for Docker
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=sha
      - name: Build and Push Container
        id: push
        uses: docker/build-push-action@v7
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  bump-action-image-tag:
    name: Bump action.yml image to released version
    needs: build-and-push-image
    if: ${{ github.event_name == 'release' }}
    runs-on: ubuntu-24.04
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Checkout main
        uses: actions/checkout@v6
        with:
          ref: main
          token: ${{ secrets.GHTOKEN }}
      - name: Compute released version
        id: version
        run: |
          TAG_NAME="${{ github.event.release.tag_name }}"
          VERSION="${TAG_NAME#v}"
          echo "value=${VERSION}" >> "$GITHUB_OUTPUT"
      - name: Update action.yml
        run: |
          yq -i ".runs.image = \"docker://${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.version.outputs.value }}\"" ./action.yml
          grep "image:" ./action.yml
      - name: Open bump PR
        env:
          GH_TOKEN: ${{ secrets.GHTOKEN }}
        run: |
          BRANCH="ci/bump-action-image-${{ steps.version.outputs.value }}"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout -b "$BRANCH"
          git add action.yml
          git commit -m "ci: bump action.yml image to ${{ steps.version.outputs.value }}"
          git push origin "$BRANCH"
          gh pr create \
            --base main \
            --head "$BRANCH" \
            --title "ci: bump action.yml image to ${{ steps.version.outputs.value }}" \
            --body "Auto-generated after release \`v${{ steps.version.outputs.value }}\` to keep \`action.yml\` in sync with the published container image."
