name: Push

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

permissions: read-all

jobs:
  release:
    permissions:
      contents: write
    runs-on: ubuntu-24.04
    name: Release
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - name: Setup Node.js
        id: setup-node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version-file: .node-version
          cache: npm
      - name: Install Dependencies
        id: npm-ci
        run: npm ci
      - name: Check Format
        id: npm-format-check
        run: npm run format:check
      - name: Lint
        id: npm-lint
        run: npm run lint
      - name: Use local Dockerfile for action under test
        run: |
          echo "Swap action.yml to local Dockerfile so the release runs against current source."
          grep "docker" < ./action.yml
          yq -i '.runs.image = "Dockerfile"' ./action.yml
          echo "Now action under test points to internal image."
          grep "Dockerfile" < ./action.yml
      - name: Release
        id: release
        uses: ./
        with:
          debug-mode: true
          dry-run: false
          default-config: true
          floating-tags: true
          add-summary: true
        env:
          GITHUB_TOKEN: ${{ secrets.GHTOKEN }}
      - name: Get the output
        run: |
          echo "release-published: ${{ steps.release.outputs.release-published }}"
          echo "release-git-head: ${{ steps.release.outputs.release-version }}"
          echo "release-major: ${{ steps.release.outputs.release-major }}"
          echo "release-minor: ${{ steps.release.outputs.release-minor }}"
          echo "release-patch: ${{ steps.release.outputs.release-patch }}"
          echo "release-type: ${{ steps.release.outputs.release-type }}"
          echo "release-git-head: ${{ steps.release.outputs.release-git-head }}"
          echo "release-git-tag: ${{ steps.release.outputs.release-git-tag }}"
